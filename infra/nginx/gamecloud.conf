# GameCloud reverse proxy — single origin on :80.
#   /        → Next.js console (:3100)
#   /api/    → FastAPI backend (:8000)   (so the browser uses one origin, no CORS)
#   /metrics → Prometheus metrics
# Install: copy to /etc/nginx/conf.d/gamecloud.conf, then `nginx -t && systemctl reload nginx`.
server {
    listen 80;
    server_name _;

    # Next.js console (websocket-friendly for HMR / live updates)
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI backend — full /api/* path is preserved upstream
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health       { proxy_pass http://127.0.0.1:8000/health; }
    location = /metrics      { proxy_pass http://127.0.0.1:8000/metrics; }
    location = /docs         { proxy_pass http://127.0.0.1:8000/docs; }
    location = /openapi.json { proxy_pass http://127.0.0.1:8000/openapi.json; }
}
